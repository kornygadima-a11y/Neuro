<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURO-LAB</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --neon: #00f2ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        #bg-video { position: fixed; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; opacity: 0.5; pointer-events: none; }
        .ui { position: relative; z-index: 100; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .glass { background: rgba(0,0,0,0.85); border: 2px solid var(--neon); border-radius: 20px; width: 85%; padding: 25px; text-align: center; box-shadow: 0 0 20px var(--neon); }
        .avatars { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
        .avatar-btn { cursor: pointer; text-align: center; }
        .avatar-btn img { width: 85px; height: 85px; border-radius: 50%; border: 2px solid #333; object-fit: cover; }
        button { width: 100%; background: var(--neon); color: #000; border: none; padding: 15px; margin-top: 15px; font-weight: bold; border-radius: 10px; text-transform: uppercase; cursor: pointer; }
        input { width: 100%; background: none; border: none; border-bottom: 2px solid var(--neon); color: #fff; text-align: center; margin-bottom: 20px; font-size: 20px; outline: none; }
    </style>
</head>
<body>
    <video id="bg-video" autoplay muted playsinline loop></video>

    <div class="ui">
        <!-- ШАГ 0: ВЫБОР -->
        <div id="s0" class="glass">
            <div style="font-weight: bold; letter-spacing: 1px;">ВЫБЕРИ ПРОВОДНИКА</div>
            <div class="avatars">
                <div class="avatar-btn" onclick="startLab('female')">
                    <img src="f_avatar.jpg.jpg" onerror="this.src='f_avatar.jpg'">
                    <div style="margin-top:10px; color:var(--neon); font-size: 12px;">НЕЙРА</div>
                </div>
                <div class="avatar-btn" onclick="startLab('male')">
                    <img src="m_avatar.jpg..jpg" onerror="this.src='m_avatar.jpg'">
                    <div style="margin-top:10px; color:var(--neon); font-size: 12px;">АЛЕКС</div>
                </div>
            </div>
        </div>

        <!-- ШАГ 1: ВВОД -->
        <div id="s1" class="glass" style="display:none">
            <input type="text" id="bd" placeholder="ДД.ММ.ГГГГ">
            <button onclick="toMenu()">ПОДКЛЮЧИТЬСЯ</button>
        </div>

        <!-- ШАГ 2: МЕНЮ -->
        <div id="s2" class="glass" style="display:none">
            <button onclick="act(7)">АСТРО-ПРОГНОЗ</button>
            <button onclick="act(6)">НУМЕРОЛОГИЯ</button>
            <button onclick="act(8)">БИО-РИТМЫ</button>
            <button style="background:#ff00ff" onclick="act(3)">🔒 СОВМЕСТИМОСТЬ</button>
        </div>

        <!-- ШАГ 3: РЕЗУЛЬТАТ -->
        <div id="s3" class="glass" style="display:none">
            <div id="res" style="margin-bottom:20px; font-size: 14px;">АНАЛИЗ ЗАВЕРШЕН...</div>
            <button onclick="location.reload()">ЗАНОВО</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let hero = 'female';
        const v = document.getElementById('bg-video');

        function startLab(h) {
            hero = h;
            document.getElementById('s0').style.display = 'none';
            document.getElementById('s1').style.display = 'block';
            playVid(1, false);
        }

        function toMenu() {
            document.getElementById('s1').style.display = 'none';
            document.getElementById('s2').style.display = 'block';
            playVid(2, true);
        }

        function act(n) {
            document.getElementById('s2').style.display = 'none';
            playVid(n, false);
            setTimeout(() => {
                playVid(3, true); 
                setTimeout(() => {
                    playVid(4, false);
                    document.getElementById('s3').style.display = 'block';
                    document.getElementById('res').innerText = "Синхронизация завершена. Твой цифровой код принят системой.";
                }, 4000);
            }, 4000);
        }

        function playVid(n, loop) {
            // Код пробует оба твоих варианта расширений
            const paths = [hero + '/' + n + '.mp4.mp4', hero + '/' + n + '.mp4'];
            let played = false;
            paths.forEach(p => {
                if (!played) {
                    v.src = p; v.loop = loop;
                    v.play().then(() => { played = true; }).catch(() => {});
                }
            });
        }
    </script>
</body>
</html>
