<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body { margin: 0; background: #000; color: #00f2ff; font-family: sans-serif; text-align: center; }
        video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .ui { position: relative; z-index: 100; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); }
        .btn { background: rgba(0,242,255,0.2); border: 1px solid #00f2ff; color: #00f2ff; padding: 15px; border-radius: 15px; margin: 10px; cursor: pointer; width: 150px; }
        input { background: none; border: none; border-bottom: 2px solid #00f2ff; color: #fff; text-align: center; font-size: 24px; width: 80%; margin-bottom: 20px; outline: none; }
    </style>
</head>
<body>
    <video id="v" playsinline muted></video>
    <div class="ui" id="box">
        <div id="s0">
            <h3>NEURO-LAB</h3>
            <div style="display:flex; gap:20px;">
                <div class="btn" onclick="st('female')"><img src="f_avatar.jpg" width="80" style="border-radius:50%"><br>НЕЙРА</div>
                <div class="btn" onclick="st('male')"><img src="m_avatar.jpg" width="80" style="border-radius:50%"><br>АЛЕКС</div>
            </div>
        </div>
        <div id="s1" style="display:none">
            <input type="tel" id="bd" placeholder="ДД.ММ.ГГГГ">
            <div class="btn" style="width:200px" onclick="tm()">ПОДКЛЮЧИТЬСЯ</div>
        </div>
        <div id="s2" style="display:none">
            <div class="btn" onclick="ask('Астро')">АСТРО</div>
            <div class="btn" onclick="ask('Числа')">ЧИСЛА</div>
            <div id="res" style="padding:20px; font-size:14px; color:#fff"></div>
        </div>
    </div>
    <script>
        var tg = window.Telegram.WebApp; tg.expand();
        var hero = 'female'; var v = document.getElementById('v');
        var KEY = "AIzaSyDh65nKEprjrOfjS2g_ckvqvFWCgNg1kck";

        function pl(n, l) { v.src = hero + "/" + n + ".mp4"; v.loop = l; v.play(); }

        function st(h) { 
            hero = h; v.muted = false;
            document.getElementById('s0').style.display='none';
            document.getElementById('s1').style.display='block';
            pl(1, false);
        }

        function tm() {
            document.getElementById('s1').style.display='none';
            document.getElementById('s2').style.display='block';
            pl(2, true);
        }

        async function ask(t) {
            var rb = document.getElementById('res');
            rb.innerText = "Считываю код...";
            var b = document.getElementById('bd').value;
            var p = "Ты мудрый Оракул " + hero + ". Дай прогноз на тему " + t + " для даты " + b + ". 2 предложения.";
            try {
                var r = await fetch("https://generativelanguage.googleapis.com" + KEY, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({contents: [{parts: [{text: p}]}]})
                });
                var d = await r.json();
                rb.innerText = d.candidates[0].content.parts[0].text;
            } catch (e) { rb.innerText = "Ошибка связи."; }
        }
    </script>
</body>
</html>
