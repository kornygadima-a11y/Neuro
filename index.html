<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #00f2ff; font-family: Arial, sans-serif; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.6; }
        .ui { position: relative; z-index: 100; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .box { background: rgba(0,0,0,0.8); border: 2px solid #00f2ff; border-radius: 20px; width: 85%; padding: 20px; text-align: center; }
        .av-row { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
        .av-btn { cursor: pointer; }
        .av-btn img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #00f2ff; }
        button { width: 100%; background: #00f2ff; color: #000; border: none; padding: 15px; margin-top: 10px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        input { width: 100%; background: none; border: none; border-bottom: 2px solid #00f2ff; color: #fff; text-align: center; margin-bottom: 20px; font-size: 20px; outline: none; }
    </style>
</head>
<body>
    <video id="bg-video" autoplay muted playsinline loop></video>
    <div class="ui">
        <div id="step0" class="box">
            <div>ВЫБЕРИ ПРОВОДНИКА</div>
            <div class="av-row">
                <div class="av-btn" onclick="goStep1('female')"><img src="f_avatar.jpg.jpg" onerror="this.src='f_avatar.jpg'"><br>НЕЙРА</div>
                <div class="av-btn" onclick="goStep1('male')"><img src="m_avatar.jpg..jpg" onerror="this.src='m_avatar.jpg'"><br>АЛЕКС</div>
            </div>
        </div>
        <div id="step1" class="box" style="display:none">
            <input type="text" id="dateInput" placeholder="ДД.ММ.ГГГГ">
            <button onclick="goStep2()">ИНИЦИАЛИЗИРОВАТЬ</button>
        </div>
        <div id="step2" class="box" style="display:none">
            <button onclick="runModule(7)">АСТРО-ПРОГНОЗ</button>
            <button onclick="runModule(6)">НУМЕРОЛОГИЯ</button>
            <button onclick="runModule(8)">БИО-РИТМЫ</button>
        </div>
        <div id="step3" class="box" style="display:none">
            <div id="resultText">ИДЕТ АНАЛИЗ...</div>
            <button onclick="location.reload()">ЗАНОВО</button>
        </div>
    </div>
    <script>
        var tg = window.Telegram.WebApp;
        tg.expand();
        var currentHero = 'female';
        var videoPlayer = document.getElementById('bg-video');

        function goStep1(hero) {
            currentHero = hero;
            document.getElementById('step0').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
            changeVideo(1, false);
        }

        function goStep2() {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            changeVideo(2, true);
        }

        function runModule(num) {
            document.getElementById('step2').style.display = 'none';
            changeVideo(num, false);
            setTimeout(function() {
                changeVideo(3, true);
                setTimeout(function() {
                    changeVideo(4, false);
                    document.getElementById('step3').style.display = 'block';
                    document.getElementById('resultText').innerHTML = "СИНХРОНИЗАЦИЯ ЗАВЕРШЕНА.<br>ВАШ КОД ПРИНЯТ СИСТЕМОЙ.";
                }, 4000);
            }, 4000);
        }

        function changeVideo(n, isLoop) {
            var path1 = currentHero + '/' + n + '.mp4.mp4';
            var path2 = currentHero + '/' + n + '.mp4';
            videoPlayer.src = path1;
            videoPlayer.loop = isLoop;
            videoPlayer.play().catch(function() {
                videoPlayer.src = path2;
                videoPlayer.play().catch(function(){});
            });
        }
    </script>
</body>
</html>
