<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURO-LAB OFFLINE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; color: #00f2ff; }
        video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; background: #111; }
        .ui { position: relative; z-index: 100; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); }
        .glass { background: rgba(0,0,0,0.8); border: 2px solid #00f2ff; border-radius: 20px; width: 85%; max-width: 400px; padding: 25px; text-align: center; box-shadow: 0 0 20px #00f2ff; }
        .avatars { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
        .av-btn { cursor: pointer; text-align: center; font-size: 14px; transition: 0.3s; }
        .av-btn img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid #00f2ff; margin-bottom: 10px; }
        .av-btn:active { transform: scale(0.9); color: #fff; }
        button { width: 100%; background: #00f2ff; color: #000; border: none; padding: 15px; margin-top: 15px; font-weight: bold; border-radius: 10px; text-transform: uppercase; cursor: pointer; }
        input { width: 100%; background: none; border: none; border-bottom: 2px solid #00f2ff; color: #fff; text-align: center; margin-bottom: 20px; font-size: 24px; outline: none; padding: 10px 0; }
    </style>
</head>
<body>
    <!-- Плеер без привязки к TG -->
    <video id="v" playsinline muted loop></video>

    <div class="ui">
        <!-- ШАГ 0: ВЫБОР -->
        <div id="s0" class="glass">
            <div style="font-weight: bold; letter-spacing: 2px;">ВЫБЕРИ ПРОВОДНИКА</div>
            <div class="avatars">
                <div class="av-btn" onclick="start('female')">
                    <img src="f_avatar.jpg">
                    <div>НЕЙРА</div>
                </div>
                <div class="av-btn" onclick="start('male')">
                    <img src="m_avatar.jpg">
                    <div>АЛЕКС</div>
                </div>
            </div>
        </div>

        <!-- ШАГ 1: ВВОД ДАТЫ -->
        <div id="s1" class="glass" style="display:none">
            <div style="margin-bottom: 15px;">ВВЕДИ ДАТУ РОЖДЕНИЯ</div>
            <input type="tel" id="bd" placeholder="ДД.ММ.ГГГГ">
            <button onclick="menu()">ПОДКЛЮЧИТЬСЯ</button>
        </div>

        <!-- ШАГ 2: МЕНЮ -->
        <div id="s2" class="glass" style="display:none">
            <button onclick="ask('Астропрогноз')">АСТРО-ПРОГНОЗ</button>
            <button onclick="ask('Нумерология')">НУМЕРОЛОГИЯ</button>
            <button onclick="ask('Биоритмы')">БИО-РИТМЫ</button>
            <div id="res" style="margin-top:20px; font-size: 14px; color: #fff; line-height: 1.4;"></div>
            <button onclick="location.reload()" style="background:none; border:1px solid #555; color:#555; margin-top:20px;">ЗАНОВО</button>
        </div>
    </div>

    <script>
        var hero = 'female';
        var video = document.getElementById('v');
        var KEY = "AIzaSyDh65nKEprjrOfjS2g_ckvqvFWCgNg1kck";

        function playVid(n, loop) {
            // Пробуем запустить видео
            video.src = hero + "/" + n + ".mp4";
            video.loop = loop;
            video.play().catch(function(e) { console.log("Видео не найдено"); });
        }

        function start(choice) {
            hero = choice;
            video.muted = false; // Включаем звук первым касанием
            document.getElementById('s0').style.display = 'none';
            document.getElementById('s1').style.display = 'block';
            playVid(1, false); // Видео приветствия
        }

        function menu() {
            document.getElementById('s1').style.display = 'none';
            document.getElementById('s2').style.display = 'block';
            playVid(2, true); // Видео ожидания
        }

        async function ask(type) {
            var resBox = document.getElementById('res');
            resBox.innerText = "СВЯЗЬ С МАТРИЦЕЙ...";
            
            var birthday = document.getElementById('bd').value;
            var prompt = "Ты мудрый Оракул " + (hero === 'female' ? 'Нейра' : 'Алекс') + ". Дай мудрый прогноз на тему " + type + " для даты рождения " + birthday + ". 2 предложения.";

            try {
                var response = await fetch("https://generativelanguage.googleapis.com" + KEY, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                var data = await response.json();
                var text = data.candidates[0].content.parts[0].text;
                resBox.innerText = text;
            } catch (e) {
                resBox.innerText = "ОШИБКА СВЯЗИ. ЗВЕЗДЫ СКРЫТЫ.";
            }
        }
    </script>
</body>
</html>
