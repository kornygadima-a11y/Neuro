<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURO-LAB</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --neon: #00f2ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; background: #000; }

        .ui { position: relative; z-index: 100; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        
        /* Сделал фон прозрачнее - 0.4 вместо 0.85 */
        .glass { background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); border: 1px solid var(--neon); border-radius: 20px; width: 85%; padding: 25px; text-align: center; box-shadow: 0 0 15px rgba(0,242,255,0.3); pointer-events: auto; }
        
        .avatars { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .hero-btn { cursor: pointer; text-align: center; transition: 0.2s; }
        .hero-btn img { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; opacity: 0.9; }
        
        /* Кнопки теперь тоже полупрозрачные */
        button { width: 100%; background: rgba(0,242,255,0.2); color: var(--neon); border: 1px solid var(--neon); padding: 15px; margin-top: 15px; font-weight: bold; border-radius: 10px; text-transform: uppercase; cursor: pointer; backdrop-filter: blur(5px); }
        button:active { background: var(--neon); color: #000; }
        
        input { width: 100%; background: none; border: none; border-bottom: 2px solid var(--neon); color: #fff; text-align: center; margin-bottom: 20px; font-size: 24px; outline: none; padding: 10px 0; }
    </style>
</head>
<body>
    <video id="bg-video" playsinline muted></video>

    <div class="ui">
        <div id="s0" class="glass">
            <div style="font-weight: bold; letter-spacing: 2px; color: var(--neon);">NEURO-LAB</div>
            <div class="avatars">
                <div class="hero-btn" onclick="startLab('female')">
                    <img src="f_avatar.jpg">
                    <div style="margin-top:10px; font-size: 12px;">НЕЙРА</div>
                </div>
                <div class="hero-btn" onclick="startLab('male')">
                    <img src="m_avatar.jpg">
                    <div style="margin-top:10px; font-size: 12px;">АЛЕКС</div>
                </div>
            </div>
        </div>

        <div id="s1" class="glass" style="display:none">
            <div style="margin-bottom: 15px; font-size: 12px; color: var(--neon);">ВВОД ДАННЫХ...</div>
            <input type="tel" id="birthdate" placeholder="ДД.ММ.ГГГГ" maxlength="10">
            <button onclick="toMenu()">ИНИЦИАЛИЗИРОВАТЬ</button>
        </div>

        <div id="s2" class="glass" style="display:none">
            <button onclick="act(7)">АСТРО-ПРОГНОЗ</button>
            <button onclick="act(6)">НУМЕРОЛОГИЯ</button>
            <button onclick="act(8)">БИО-РИТМЫ</button>
            <button style="border-color: #ff00ff; color: #ff00ff;" onclick="act(3)">🔒 СОВМЕСТИМОСТЬ</button>
        </div>

        <div id="s3" class="glass" style="display:none">
            <div id="res" style="margin-bottom:20px; font-size: 16px; line-height: 1.4;"></div>
            <button onclick="location.reload()">ЗАНОВО</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let hero = 'female';
        const v = document.getElementById('bg-video');

        function playVid(n, loop) {
            v.src = hero + '/' + n + '.mp4';
            v.loop = loop;
            v.play();
        }

        function startLab(choice) {
            hero = choice;
            v.muted = false;
            document.getElementById('s0').style.display = 'none';
            document.getElementById('s1').style.display = 'block';
            
            // Проигрываем приветствие (видео 1) и НЕ зацикливаем его
            playVid(1, false); 
            
            // Когда видео 1 закончится, оно само встанет на паузу на последнем кадре
            document.getElementById('birthdate').focus();
        }

        function toMenu() {
            const val = document.getElementById('birthdate').value;
            if(!val) return;
            document.getElementById('s1').style.display = 'none';
            document.getElementById('s2').style.display = 'block';
            // Включаем видео 2 (ожидание) в режиме петли (loop)
            playVid(2, true); 
        }

        function act(n) {
            document.getElementById('s2').style.display = 'none';
            playVid(n, false);
            // Ждем завершения модуля (примерно 4 сек)
            setTimeout(() => {
                playVid(3, true); // Сканирование
                setTimeout(() => {
                    playVid(4, false); // Результат
                    document.getElementById('s3').style.display = 'block';
                    document.getElementById('res').innerText = "АНАЛИЗ ЗАВЕРШЕН. СИНХРОНИЗАЦИЯ УСПЕШНА.";
                }, 4000);
            }, 4000);
        }
    </script>
</body>
</html>
