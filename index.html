<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Neuro-Lab | Digital Oracle</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #00f2ff; font-family: Arial, sans-serif; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.6; }
        .ui { position: relative; z-index: 100; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .box { background: rgba(0,0,0,0.85); border: 2px solid #00f2ff; border-radius: 20px; width: 85%; padding: 20px; text-align: center; box-shadow: 0 0 20px rgba(0,242,255,0.3); }
        .av-row { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
        .av-btn { cursor: pointer; transition: transform 0.2s; }
        .av-btn:hover { transform: scale(1.05); }
        .av-btn img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #00f2ff; }
        button { width: 100%; background: #00f2ff; color: #000; border: none; padding: 15px; margin-top: 10px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #00d9e6; }
        input { width: 100%; background: none; border: none; border-bottom: 2px solid #00f2ff; color: #fff; text-align: center; margin-bottom: 20px; font-size: 20px; outline: none; padding: 10px 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <video id="bg-video" autoplay muted playsinline preload="auto"></video>
    <div class="ui">
        <div id="step0" class="box">
            <div style="font-size:18px;margin-bottom:15px">ВЫБЕРИ ПРОВОДНИКА</div>
            <div class="av-row">
                <div class="av-btn" onclick="goStep1('female')">
                    <img src="f_avatar.jpg" onerror="this.src='f_avatar.jpg.jpg'"><br>
                    <span style="margin-top:8px;display:block">НЕЙРА</span>
                </div>
                <div class="av-btn" onclick="goStep1('male')">
                    <img src="m_avatar.jpg" onerror="this.src='m_avatar.jpg.jpg'"><br>
                    <span style="margin-top:8px;display:block">АЛЕКС</span>
                </div>
            </div>
        </div>
        <div id="step1" class="box hidden">
            <div style="margin-bottom:10px">ВВЕДИ ДАТУ РОЖДЕНИЯ</div>
            <input type="text" id="dateInput" placeholder="ДД.ММ.ГГГГ" maxlength="10">
            <button onclick="goStep2()">ИНИЦИАЛИЗИРОВАТЬ</button>
        </div>
        <div id="step2" class="box hidden">
            <div style="margin-bottom:15px">ВЫБЕРИ МОДУЛЬ</div>
            <button onclick="runModule(7)">🔮 АСТРО-ПРОГНОЗ</button>
            <button onclick="runModule(6)">🔢 НУМЕРОЛОГИЯ</button>
            <button onclick="runModule(8)">📊 БИО-РИТМЫ</button>
        </div>
        <div id="step3" class="box hidden">
            <div id="resultText" style="min-height:60px;margin-bottom:15px">⏳ ИДЁТ АНАЛИЗ...</div>
            <button onclick="location.reload()">🔄 ЗАНОВО</button>
        </div>
    </div>
    <script>
        var tg = window.Telegram && window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.enableClosingConfirmation(); }
        
        var currentHero = 'female';
        var videoPlayer = document.getElementById('bg-video');
        var steps = ['step0','step1','step2','step3'];

        function showStep(n) {
            for (var i=0; i<steps.length; i++) {
                document.getElementById(steps[i]).className = 'box' + (i===n ? '' : ' hidden');
            }
        }

        function goStep1(hero) {
            currentHero = hero;
            showStep(1);
            changeVideo(1, false);
        }

        function goStep2() {
            var dateVal = document.getElementById('dateInput').value;
            if (!dateVal || dateVal.length < 8) {
                alert('⚠️ Введите дату в формате ДД.ММ.ГГГГ');
                return;
            }
            showStep(2);
            changeVideo(2, true);
        }

        function runModule(num) {
            showStep(3);
            document.getElementById('resultText').innerHTML = "⏳ ЗАГРУЗКА МОДУЛЯ...";
            
            changeVideo(num, false);
            setTimeout(function() {
                changeVideo(3, true);
                setTimeout(function() {
                    changeVideo(4, false);
                    var results = {
                        6: "🔢 ВАШ НУМЕРОЛОГИЧЕСКИЙ КОД: " + generateNumber(),
                        7: "🔮 ЗВЁЗДЫ ГОВОРЯТ: " + generateAstro(),
                        8: "📊 БИОРИТМЫ: " + generateBio()
                    };
                    document.getElementById('resultText').innerHTML = results[num] || "✅ ДАННЫЕ ПОЛУЧЕНЫ";
                }, 4000);
            }, 4000);
        }

        function changeVideo(n, isLoop) {
            var path1 = currentHero + '/' + n + '.mp4.mp4';
            var path2 = currentHero + '/' + n + '.mp4';
            
            videoPlayer.loop = isLoop;
            videoPlayer.src = path1;
            videoPlayer.play().catch(function() {
                videoPlayer.src = path2;
                videoPlayer.play().catch(function() {
                    console.log('⚠️ Видео не найдено: ' + n);
                });
            });
        }
        
        function generateNumber() { return Math.floor(Math.random()*999)+1; }
        function generateAstro() { var s = ["УСПЕХ В ДЕЛАХ", "НОВЫЕ СВЯЗИ", "ВРЕМЯ ДЕЙСТВИЙ", "ИНТУИЦИЯ НА ПИКЕ"]; return s[Math.floor(Math.random()*s.length)]; }
        function generateBio() { var s = ["ЭНЕРГИЯ: 87%", "ФОКУС: ВЫСОКИЙ", "ТВОРЧЕСТВО: АКТИВНО", "БАЛАНС: СТАБИЛЕН"]; return s[Math.floor(Math.random()*s.length)]; }
    </script>
</body>
</html>
