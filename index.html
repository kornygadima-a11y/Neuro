<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURO-LAB</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --neon: #00f2ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        #bg-video { position: fixed; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; background: #000; }
        .ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .glass { background: rgba(0,0,0,0.85); border: 2px solid var(--neon); border-radius: 20px; width: 85%; padding: 25px; text-align: center; box-shadow: 0 0 20px var(--neon); pointer-events: auto; }
        .avatars { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .avatar-btn { cursor: pointer; text-align: center; }
        .avatar-btn img { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; }
        button { width: 100%; background: var(--neon); color: #000; border: none; padding: 15px; margin-top: 15px; font-weight: bold; border-radius: 10px; text-transform: uppercase; cursor: pointer; }
        input { width: 100%; background: none; border: none; border-bottom: 2px solid var(--neon); color: #fff; text-align: center; margin-bottom: 20px; font-size: 22px; outline: none; }
    </style>
</head>
<body>
    <video id="bg-video" autoplay muted playsinline loop></video>

    <div class="ui">
        <div id="s0" class="glass">
            <div style="font-weight: bold;">ВЫБЕРИ ПРОВОДНИКА</div>
            <div class="avatars">
                <!-- При клике передаем латинское название папки -->
                <div class="avatar-btn" onclick="start('female')">
                    <img src="f_avatar.jpg">
                    <div style="margin-top:10px; color:var(--neon)">НЕЙРА</div>
                </div>
                <div class="avatar-btn" onclick="start('male')">
                    <img src="m_avatar.jpg">
                    <div style="margin-top:10px; color:var(--neon)">АЛЕКС</div>
                </div>
            </div>
        </div>

        <div id="s1" class="glass" style="display:none">
            <input type="text" id="bd" placeholder="ДД.ММ.ГГГГ">
            <button onclick="toMenu()">ПОДКЛЮЧИТЬСЯ</button>
        </div>

        <div id="s2" class="glass" style="display:none">
            <button onclick="act(7)">АСТРО-ПРОГНОЗ</button>
            <button onclick="act(6)">НУМЕРОЛОГИЯ</button>
            <button onclick="act(8)">БИО-РИТМЫ</button>
        </div>

        <div id="s3" class="glass" style="display:none">
            <div id="res" style="margin-bottom:20px; font-size: 16px;">АНАЛИЗ ЗАВЕРШЕН</div>
            <button onclick="location.reload()">ЗАНОВО</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let hero = 'female';
        const v = document.getElementById('bg-video');

        function start(choice) {
            hero = choice;
            v.muted = false; // "Будим" звук кликом
            document.getElementById('s0').style.display = 'none';
            document.getElementById('s1').style.display = 'block';
            playVid(1, false);
        }

        function toMenu() {
            document.getElementById('s1').style.display = 'none';
            document.getElementById('s2').style.display = 'block';
            playVid(2, true);
        }

        function act(n) {
            document.getElementById('s2').style.display = 'none';
            playVid(n, false);
            setTimeout(function() {
                playVid(3, true); 
                setTimeout(function() {
                    playVid(4, false);
                    document.getElementById('s3').style.display = 'block';
                }, 4000);
            }, 4000);
        }

        function playVid(n, loop) {
            // Формируем путь. n - номер видео (1, 2, 3...)
            const path = hero + '/' + n + '.mp4';
            console.log("Загружаю видео: " + path);
            v.src = path;
            v.loop = loop;
            v.load();
            v.play().catch(function(e) {
                console.log("Ошибка: видео не найдено по пути " + path);
            });
        }
    </script>
</body>
</html>
