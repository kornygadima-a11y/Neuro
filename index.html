<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neuro-Lab | Цифровой Оракул</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            color: #00f2ff; font-family: 'Segoe UI', Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 🎬 ЧИСТОЕ ВИДЕО ФОН — без перекрытий */
        #bg-video { 
            position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; z-index: 1; 
            opacity: 0.9;
        }
        
        /* 🖼️ UI-слой — поверх видео */
        .ui { 
            position: relative; z-index: 100; 
            height: 100vh; display: flex; 
            flex-direction: column; 
            align-items: center; justify-content: center; 
            padding: 20px;
        }
        
        /* 🪟 ПРОЗРАЧНОЕ СТЕКЛО — не матовое, всё видно */
        .glass-panel { 
            background: rgba(0, 15, 30, 0.15); 
            border: 1px solid rgba(0, 242, 255, 0.3); 
            border-radius: 20px; 
            width: 95%; max-width: 450px;
            padding: 25px 20px; 
            text-align: center;
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 👤 АВТАРКА — центральный элемент */
        .avatar-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
        }
        
        .avatar {
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 3px solid rgba(0, 242, 255, 0.6);
            object-fit: cover;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.4);
            animation: avatarGlow 3s infinite;
        }
        
        @keyframes avatarGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(0, 242, 255, 0.4); }
            50% { box-shadow: 0 0 60px rgba(0, 242, 255, 0.7); }
        }
        
        /* 📝 ТЕКСТ ВОКРУГ АВТАРКИ */
        .avatar-text {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.8);
        }
        
        /* ⌨️ ЭФФЕКТ ПЕЧАТНОЙ МАШИНКИ */
        .typing-text {
            overflow: hidden;
            border-right: 2px solid #00f2ff;
            white-space: nowrap;
            animation: typing 3s steps(40) infinite, blink 0.8s step-end infinite;
            max-width: 100%;
            display: inline-block;
        }
        
        @keyframes typing {
            from { max-width: 0; }
            to { max-width: 100%; }
        }
        
        @keyframes blink {
            50% { border-color: transparent; }
        }
        
        /* 🎯 ВЫБОР ПЕРСОНАЖА */
        .character-select {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .character-btn {
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            padding: 15px;
            border-radius: 16px;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid transparent;
        }
        
        .character-btn:hover {
            transform: scale(1.05);
            background: rgba(0, 242, 255, 0.15);
            border-color: rgba(0, 242, 255, 0.5);
        }
        
        .character-btn img {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(0, 242, 255, 0.6);
            object-fit: cover;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.3);
        }
        
        .character-btn div {
            margin-top: 10px;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        /* 🔘 КНОПКИ — прозрачные */
        button {
            width: 100%;
            background: rgba(0, 242, 255, 0.1);
            color: #00f2ff;
            border: 1px solid rgba(0, 242, 255, 0.4);
            padding: 14px 20px;
            margin-top: 12px;
            font-weight: 600;
            font-size: 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        button:hover {
            background: rgba(0, 242, 255, 0.25);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0) scale(0.98);
        }
        
        /* 💎 ПРЕМИУМ */
        button.premium {
            background: rgba(255, 215, 0, 0.15);
            border-color: rgba(255, 215, 0, 0.5);
            color: #ffd700;
        }
        
        button.premium:hover {
            background: rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
        }
        
        /* 📝 ПОЛЕ ВВОДА */
        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-bottom: 2px solid #00f2ff;
            color: #fff;
            text-align: center;
            margin: 15px 0 20px;
            padding: 14px;
            font-size: 18px;
            outline: none;
            border-radius: 12px;
        }
        
        input:focus {
            background: rgba(0, 242, 255, 0.08);
            border-color: #00f2ff;
        }
        
        input::placeholder {
            color: rgba(0, 242, 255, 0.5);
        }
        
        /* 🔊 КНОПКА ЗВУКА */
        .sound-toggle {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 200;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 242, 255, 0.15);
            border: 2px solid rgba(0, 242, 255, 0.5);
            color: #00f2ff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .sound-toggle:hover {
            background: rgba(0, 242, 255, 0.3);
            transform: scale(1.1);
        }
        
        .sound-toggle.muted {
            opacity: 0.5;
            border-color: rgba(255, 100, 100, 0.5);
            color: #ff6464;
        }
        
        /* 📊 ПРОГРЕСС БАРИ */
        .progress-container {
            width: 100%;
            margin: 15px 0;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(0, 242, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f2ff, #00ff88);
            width: 0%;
            transition: width 0.5s ease;
        }
        
        /* 📄 РЕЗУЛЬТАТ */
        #resultText {
            min-height: 120px;
            font-size: 15px;
            line-height: 1.8;
            text-align: left;
            padding: 10px;
        }
        
        /* 🎯 ЗАГОЛОВОК */
        .title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
        }
        
        /* ⏳ ИНДИКАТОР ЗАГРУЗКИ */
        .loader {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0, 242, 255, 0.3);
            border-top-color: #00f2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 📤 ШЕРИНГ */
        .share-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .share-btn {
            flex: 1;
            padding: 12px;
            font-size: 13px;
        }
        
        /* 💰 МОНЕТИЗАЦИЯ БЛОК */
        .monetization-block {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 242, 255, 0.2);
        }
        
        .price-badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #ffd700;
            margin-bottom: 12px;
        }
        
        /* 📱 АДАПТИВНОСТЬ */
        @media (max-width: 380px) {
            .avatar { width: 110px; height: 110px; }
            .avatar-container { width: 110px; height: 110px; }
            .character-btn img { width: 80px; height: 80px; }
            .glass-panel { padding: 20px 15px; }
        }
    </style>
</head>
<body>
    <!-- 🎬 ЧИСТОЕ ВИДЕО ФОН -->
    <video id="bg-video" autoplay muted playsinline loop>
        <source src="" type="video/mp4">
    </video>
    
    <!-- 🔊 КНОПКА ЗВУКА -->
    <button class="sound-toggle" id="soundBtn" onclick="toggleSound()">🔇</button>
    
    <!-- 🎨 ИНТЕРФЕЙС -->
    <div class="ui">
        
        <!-- ЭКРАН 0: ВЫБОР ПЕРСОНАЖА -->
        <div id="step0" class="glass-panel">
            <div class="title">✨ ВЫБЕРИ ПРОВОДНИКА</div>
            
            <div class="character-select">
                <div class="character-btn" onclick="selectCharacter('female')">
                    <img src="f_avatar.jpg.jpg" onerror="this.src='f_avatar.jpg'" alt="Нейра">
                    <div>НЕЙРА</div>
                </div>
                <div class="character-btn" onclick="selectCharacter('male')">
                    <img src="m_avatar.jpg.jpg" onerror="this.src='m_avatar.jpg'" alt="Алекс">
                    <div>АЛЕКС</div>
                </div>
            </div>
            
            <div style="font-size: 11px; opacity: 0.6; margin-top: 15px;">
                🔮 Первый сеанс — бесплатно
            </div>
        </div>
        
        <!-- ЭКРАН 1: ВВОД ДАТЫ -->
        <div id="step1" class="glass-panel" style="display:none">
            <div class="avatar-container">
                <img id="currentAvatar" class="avatar" src="" alt="Avatar">
            </div>
            
            <div class="avatar-text">
                <span class="typing-text" id="typingText1"></span>
            </div>
            
            <input type="tel" id="dateInput" placeholder="ДД.ММ.ГГГГ" maxlength="10">
            <button onclick="goStep2()">🔗 ПОДКЛЮЧИТЬСЯ</button>
            
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress1"></div>
                </div>
            </div>
        </div>
        
        <!-- ЭКРАН 2: МЕНЮ МОДУЛЕЙ -->
        <div id="step2" class="glass-panel" style="display:none">
            <div class="avatar-container">
                <img id="currentAvatar2" class="avatar" src="" alt="Avatar">
            </div>
            
            <div class="avatar-text">
                <span class="typing-text" id="typingText2"></span>
            </div>
            
            <div class="title" style="font-size: 16px; margin-top: 40px;">ВЫБЕРИ МОДУЛЬ</div>
            
            <button onclick="runModule(7)">🔮 АСТРО-ПРОГНОЗ</button>
            <button onclick="runModule(6)">🔢 НУМЕРОЛОГИЯ</button>
            <button onclick="runModule(8)">📊 БИО-РИТМЫ</button>
            
            <!-- 💎 ПРЕМИУМ -->
            <div class="monetization-block">
                <div class="price-badge">⭐ 50 STARS</div>
                <button class="premium" onclick="buyPremium()">
                    💎 ПОЛНЫЙ РАЗБОР (3 В 1)
                </button>
                <div style="font-size: 11px; opacity: 0.6; margin-top: 10px;">
                    Все модули + персональные рекомендации
                </div>
            </div>
        </div>
        
        <!-- ЭКРАН 3: АНАЛИЗ -->
        <div id="step3" class="glass-panel" style="display:none">
            <div class="avatar-container">
                <img id="currentAvatar3" class="avatar" src="" alt="Avatar">
            </div>
            
            <div class="avatar-text">
                <span class="typing-text" id="typingText3"></span>
            </div>
            
            <div style="margin: 30px 0;">
                <div class="loader"></div>
                <div style="margin-top: 15px; font-size: 14px;">АНАЛИЗ ДАННЫХ...</div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress3"></div>
                </div>
            </div>
        </div>
        
        <!-- ЭКРАН 4: РЕЗУЛЬТАТ -->
        <div id="step4" class="glass-panel" style="display:none">
            <div class="avatar-container">
                <img id="currentAvatar4" class="avatar" src="" alt="Avatar">
            </div>
            
            <div class="title">✅ РЕЗУЛЬТАТ</div>
            
            <div id="resultText"></div>
            
            <!-- 💰 МОНЕТИЗАЦИЯ -->
            <div class="monetization-block" id="upsellBlock">
                <div class="price-badge">⭐ 50 STARS</div>
                <button class="premium" onclick="buyPremium()">
                    🔓 РАЗБЛОКИРОВАТЬ ПОЛНЫЙ ДОСТУП
                </button>
                
                <div class="share-buttons">
                    <button class="share-btn" onclick="shareResult()">📤 ПОДЕЛИТЬСЯ</button>
                    <button class="share-btn" onclick="saveResult()">💾 СОХРАНИТЬ</button>
                </div>
            </div>
            
            <button onclick="location.reload()">🔄 ЗАНОВО</button>
        </div>
        
    </div>

    <script>
        // ✅ TELEGRAM WEBAPP
        var tg = window.Telegram.WebApp;
        if (tg) { 
            tg.expand(); 
            tg.ready();
        }
        
        var currentHero = 'female';
        var videoPlayer = document.getElementById('bg-video');
        var VIDEO_SPEED = 0.8; // 🐌 Замедление
        var isMuted = true;
        
        // 🔊 УПРАВЛЕНИЕ ЗВУКОМ
        function toggleSound() {
            isMuted = !isMuted;
            videoPlayer.muted = isMuted;
            var btn = document.getElementById('soundBtn');
            btn.textContent = isMuted ? '🔇' : '🔊';
            btn.classList.toggle('muted', isMuted);
            
            if (!isMuted) {
                videoPlayer.play().catch(function(){});
            }
            haptic('light');
        }
        
        // 🎬 ЗАГРУЗКА ВИДЕО
        function changeVideo(n, isLoop) {
            var pathPrimary = currentHero + '/' + n + '.mp4.mp4';
            var pathFallback = currentHero + '/' + n + '.mp4';
            
            videoPlayer.pause();
            videoPlayer.loop = !!isLoop;
            videoPlayer.playbackRate = VIDEO_SPEED;
            videoPlayer.src = pathPrimary;
            
            videoPlayer.play().catch(function(err) {
                videoPlayer.src = pathFallback;
                videoPlayer.play().catch(function(){});
            });
        }
        
        // ⌨️ ЭФФЕКТ ПЕЧАТНОЙ МАШИНКИ
        function typeText(elementId, text, speed) {
            var element = document.getElementById(elementId);
            element.textContent = '';
            var i = 0;
            var interval = setInterval(function() {
                element.textContent += text.charAt(i);
                i++;
                if (i >= text.length) {
                    clearInterval(interval);
                    element.style.borderRight = 'none';
                }
            }, speed || 50);
        }
        
        // 📊 ПРОГРЕСС БАР
        function setProgress(elementId, percent) {
            document.getElementById(elementId).style.width = percent + '%';
        }
        
        // 👤 ВЫБОР ПЕРСОНАЖА
        function selectCharacter(hero) {
            currentHero = hero;
            var avatarSrc = hero === 'female' ? 'f_avatar.jpg.jpg' : 'm_avatar.jpg.jpg';
            var fallbackSrc = hero === 'female' ? 'f_avatar.jpg' : 'm_avatar.jpg';
            
            document.getElementById('currentAvatar').src = avatarSrc;
            document.getElementById('currentAvatar').onerror = function() { this.src = fallbackSrc; };
            document.getElementById('currentAvatar2').src = avatarSrc;
            document.getElementById('currentAvatar2').onerror = function() { this.src = fallbackSrc; };
            document.getElementById('currentAvatar3').src = avatarSrc;
            document.getElementById('currentAvatar3').onerror = function() { this.src = fallbackSrc; };
            document.getElementById('currentAvatar4').src = avatarSrc;
            document.getElementById('currentAvatar4').onerror = function() { this.src = fallbackSrc; };
            
            document.getElementById('step0').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
            
            typeText('typingText1', 'ВВЕДИ ДАТУ РОЖДЕНИЯ ДЛЯ СИНХРОНИЗАЦИИ...', 40);
            changeVideo(1, false);
            haptic('light');
        }
        
        // 👉 ШАГ 2
        function goStep2() {
            var dateVal = document.getElementById('dateInput').value;
            if (!dateVal || dateVal.length < 8) {
                alert('⚠️ Введите дату в формате ДД.ММ.ГГГГ');
                haptic('error');
                return;
            }
            
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            
            typeText('typingText2', 'ВЫБЕРИ МОДУЛЬ ДЛЯ АНАЛИЗА...', 40);
            changeVideo(2, true);
            setProgress('progress1', 100);
            haptic('success');
        }
        
        // 👉 ЗАПУСК МОДУЛЯ
        function runModule(num) {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'block';
            
            typeText('typingText3', 'АНАЛИЗИРУЮ ДАННЫЕ...', 40);
            changeVideo(num, false);
            haptic('light');
            
            // Прогресс бар
            var progress = 0;
            var progressInterval = setInterval(function() {
                progress += 5;
                setProgress('progress3', progress);
                if (progress >= 100) clearInterval(progressInterval);
            }, 200);
            
            // Этап 1: Видео модуля (4 сек)
            setTimeout(function() {
                changeVideo(3, false);
                typeText('typingText3', 'СКАНИРОВАНИЕ БИОПОЛЯ...', 40);
                
                // Этап 2: Сканирование (4 сек)
                setTimeout(function() {
                    changeVideo(4, true);
                    
                    // Этап 3: Результат
                    setTimeout(function() {
                        document.getElementById('step3').style.display = 'none';
                        document.getElementById('step4').style.display = 'block';
                        
                        var date = document.getElementById('dateInput').value;
                        var prediction = generateSmartPrediction(date, num);
                        document.getElementById('resultText').innerHTML = prediction;
                        
                        typeText('typingText3', 'СИНХРОНИЗАЦИЯ ЗАВЕРШЕНА', 40);
                        haptic('success');
                    }, 4000);
                }, 4000);
            }, 4000);
        }
        
        // 💎 ПОКУПКА ПРЕМИУМА
        function buyPremium() {
            haptic('warning');
            
            if (tg && tg.sendInvoice) {
                tg.sendInvoice({
                    title: 'Полный разбор Оракула',
                    description: 'Все 3 модуля + персональные рекомендации',
                    payload: 'premium_oracle_' + Date.now(),
                    provider_token: '',
                    currency: 'XTR',
                    prices: [{ label: 'Доступ', amount: 50 }],
                    start_parameter: 'premium_oracle'
                });
            } else {
                alert('💎 Полный разбор:\n\n✅ Астропрогноз\n✅ Нумерология\n✅ Биоритмы\n✅ Персональные рекомендации\n\nЦена: 50 Stars');
            }
        }
        
        // 📤 ПОДЕЛИТЬСЯ
        function shareResult() {
            var text = encodeURIComponent('🔮 Мой прогноз от Neuro-Lab:\n\n' + 
                                         document.getElementById('resultText').innerText + 
                                         '\n\nПроверь себя!');
            
            if (tg && tg.openTelegramLink) {
                tg.openTelegramLink('https://t.me/share/url?url=&text=' + text);
            } else {
                window.open('https://t.me/share/url?url=&text=' + text, '_blank');
            }
            haptic('light');
        }
        
        // 💾 СОХРАНИТЬ
        function saveResult() {
            var text = document.getElementById('resultText').innerText;
            if (navigator.share) {
                navigator.share({ title: 'Мой прогноз', text: text });
            } else {
                // Копирование в буфер
                var textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('📋 Результат скопирован в буфер!');
            }
            haptic('light');
        }
        
        // 🧠 УМНЫЕ ПРОГНОЗЫ
        function generateSmartPrediction(date, moduleType) {
            var parts = date.split('.');
            var day = parseInt(parts[0]), month = parseInt(parts[1]);
            var result = "";
            
            if (moduleType === 6) {
                var lp = calculateLifePath(date);
                result = "<b>🔢 Число Жизненного Пути: " + lp + "</b><br><br>" + 
                         getNumerologyPrediction(lp) + "<br><br>" +
                         "<small style='opacity:0.7'>📅 Рассчитано по дате: " + date + "</small>";
            } 
            else if (moduleType === 8) {
                var bio = calculateBiorhythms(date);
                result = "<b>📊 Биоритмы сегодня:</b><br><br>" +
                         createBioBar("💪 Физический", bio.physical) +
                         createBioBar("😊 Эмоциональный", bio.emotional) +
                         createBioBar("🧠 Интеллектуальный", bio.intellectual) +
                         "<br>" + getBiorhythmAdvice(bio);
            } 
            else if (moduleType === 7) {
                var sign = getZodiacSign(day, month);
                result = "<b>♈ Твой знак: " + sign + "</b><br><br>" + 
                         getAstroPrediction(sign) + "<br><br>" +

        function createBioBar(label, value) {

        // 🔢 НУМЕРОЛОГИЯ
        function calculateLifePath(dateStr) {
            var sum = dateStr.replace(/\D/g, '').split('').reduce(function(a, b) {
                return parseInt(a) + parseInt(b);
            }, 0);
            while (sum > 9 && sum !== 11 && sum !== 22) {
                sum = String(sum).split('').reduce(function(a, b) {
                    return parseInt(a) + parseInt(b);
                }, 0);
            }
            return sum;
        }

        // 📊 БИОРИТМЫ
        function calculateBiorhythms(dateStr) {
            var parts = dateStr.split('.');
            var birthDate = new Date(parts[2], parts[1] - 1, parts[0]);
            var today = new Date();
            var daysLived = Math.floor((today - birthDate) / (1000 * 60 * 60 * 24));
            
            return {
                physical: Math.round(Math.sin((2 * Math.PI * daysLived) / 23) * 100),
                emotional: Math.round(Math.sin((2 * Math.PI * daysLived) / 28) * 100),
                intellectual: Math.round(Math.sin((2 * Math.PI * daysLived) / 33) * 100)
            };
        }
        
        function getBiorhythmAdvice(values) {
            var advice = [];
            if (values.physical > 50) advice.push("💪 Тонус высок — время для спорта.");
            else if (values.physical < -50) advice.push("😴 Тело просит отдыха.");
            
            if (values.emotional > 50) advice.push("😊 Подъём — время для общения.");
            else if (values.emotional < -50) advice.push("🌧️ Береги нервы.");
            
            if (values.intellectual > 50) advice.push("🧠 Ясный ум — решай сложное.");
            else if (values.intellectual < -50) advice.push("🤯 Делай перерывы.");
            
            return advice.join("<br>") || "⚖️ Баланс.";
        }

        // 📳 HAPTIC FEEDBACK
        function haptic(type) {
            if (tg && tg.HapticFeedback) {
                if (type === 'light') tg.HapticFeedback.impactOccurred('light');
                else if (type === 'success') tg.HapticFeedback.notificationOccurred('success');

        // 📝 АВТОФОРМАТИРОВАНИЕ ДАТЫ
        document.getElementById('dateInput').addEventListener('input', function(e) {
            var val = e.target.value.replace(/\D/g, '');
            if (val.length >= 2) val = val.slice(0,2) + '.' + val.slice(2);
            if (val.length >= 5) val = val.slice(0,5) + '.' + val.slice(5,9);
            e.target.value = val;
        });
        
        // ⌨️ ENTER ДЛЯ ОТПРАВКИ
        document.getElementById('dateInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') goStep2();
