<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURO-LAB ALPHA</title>
    <style>
        :root { --neon: #00f2ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; background: #000; }

        .ui { position: relative; z-index: 100; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        
        /* Эффект чистого стекла */
        .glass { 
            background: rgba(0,0,0,0.2); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--neon); 
            border-radius: 25px; 
            width: 80%; 
            max-width: 400px;
            padding: 30px; 
            text-align: center; 
            box-shadow: 0 0 20px rgba(0,242,255,0.2); 
            pointer-events: auto; 
            transition: all 0.5s ease;
        }
        
        .avatars { display: flex; gap: 30px; justify-content: center; margin-top: 25px; }
        .hero-btn { cursor: pointer; text-align: center; transition: 0.3s; }
        .hero-btn:hover { transform: scale(1.05); }
        .hero-btn img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; box-shadow: 0 0 15px var(--neon); }
        
        button { 
            width: 100%; 
            background: rgba(0,242,255,0.1); 
            color: var(--neon); 
            border: 1px solid var(--neon); 
            padding: 15px; 
            margin-top: 15px; 
            font-weight: bold; 
            border-radius: 12px; 
            text-transform: uppercase; 
            cursor: pointer; 
            letter-spacing: 1px;
        }
        button:hover { background: var(--neon); color: #000; }
        
        input { 
            width: 100%; 
            background: none; 
            border: none; 
            border-bottom: 2px solid var(--neon); 
            color: #fff; 
            text-align: center; 
            margin-bottom: 20px; 
            font-size: 28px; 
            outline: none; 
            padding: 10px 0; 
        }
        ::placeholder { color: rgba(255,255,255,0.3); font-size: 18px; }
    </style>
</head>
<body>
    <video id="bg-video" playsinline></video>

    <div class="ui">
        <!-- ШАГ 0: СТАРТ -->
        <div id="s0" class="glass">
            <div style="font-weight: bold; letter-spacing: 4px; color: var(--neon); margin-bottom:10px;">NEURO-LAB</div>
            <div style="font-size: 11px; opacity: 0.6; text-transform: uppercase;">Выберите проводника для связи</div>
            <div class="avatars">
                <div class="hero-btn" onclick="startLab('female')">
                    <img src="f_avatar.jpg">
                    <div style="margin-top:12px; font-size: 12px; letter-spacing: 1px;">НЕЙРА</div>
                </div>
                <div class="hero-btn" onclick="startLab('male')">
                    <img src="m_avatar.jpg">
                    <div style="margin-top:12px; font-size: 12px; letter-spacing: 1px;">АЛЕКС</div>
                </div>
            </div>
        </div>

        <!-- ШАГ 1: ВВОД ДАННЫХ (ПОЯВЛЯЕТСЯ ПОСЛЕ ВИДЕО 1) -->
        <div id="s1" class="glass" style="display:none; opacity: 0;">
            <div style="margin-bottom: 20px; font-size: 11px; letter-spacing: 2px; color: var(--neon);">ИДЕНТИФИКАЦИЯ</div>
            <input type="tel" id="birthdate" placeholder="ДД.ММ.ГГГГ" maxlength="10">
            <button onclick="toMenu()">УСТАНОВИТЬ СВЯЗЬ</button>
        </div>

        <!-- ШАГ 2: МЕНЮ -->
        <div id="s2" class="glass" style="display:none">
            <button onclick="act(7)">АСТРО-ПРОГНОЗ</button>
            <button onclick="act(6)">НУМЕРОЛОГИЯ</button>
            <button onclick="act(8)">БИО-РИТМЫ</button>
            <button style="border-color: #ff00ff; color: #ff00ff;" onclick="act(3)">🔒 СОВМЕСТИМОСТЬ</button>
        </div>

        <!-- ШАГ 3: РЕЗУЛЬТАТ -->
        <div id="s3" class="glass" style="display:none">
            <div id="res" style="margin-bottom:20px; font-size: 16px; line-height: 1.6;"></div>
            <button onclick="location.reload()">ОБНУЛИТЬ СИСТЕМУ</button>
        </div>
    </div>

    <script>
        let hero = 'female';
        const v = document.getElementById('bg-video');

        function playVid(n, isLoop) {
            v.src = hero + '/' + n + '.mp4';
            v.loop = isLoop;
            v.play();
        }

        function startLab(choice) {
            hero = choice;
            // Скрываем выбор героя
            document.getElementById('s0').style.display = 'none';
            
            // Запускаем приветствие
            playVid(1, false); 

            // Когда приветствие закончится
            v.onended = function() {
                const s1 = document.getElementById('s1');
                s1.style.display = 'block';
                // Плавное появление окна ввода
                setTimeout(() => { s1.style.opacity = "1"; }, 50);
            };
        }

        function toMenu() {
            const val = document.getElementById('birthdate').value;
            if(!val) return;
            document.getElementById('s1').style.display = 'none';
            document.getElementById('s2').style.display = 'block';
            playVid(2, true); 
        }

        function act(n) {
            document.getElementById('s2').style.display = 'none';
            playVid(n, false);
            setTimeout(() => {
                playVid(3, true); // Сканирование
                setTimeout(() => {
                    playVid(4, false); // Итог
                    document.getElementById('s3').style.display = 'block';
                    document.getElementById('res').innerText = "Синхронизация завершена. Ваши биоритмы интегрированы в нейронную сеть Оракула.";
                }, 4000);
            }, 4000);
        }
    </script>
</body>
</html>
