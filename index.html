<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURO-LAB PRO</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --neon: #00f2ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; background: #000; }
        .ui { position: absolute; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 100; pointer-events: none; }
        .glass { background: rgba(0,0,0,0.2); backdrop-filter: blur(8px); border: 1px solid rgba(0,242,255,0.4); border-radius: 25px; width: 85%; max-width: 400px; padding: 25px; text-align: center; pointer-events: auto; transition: opacity 0.8s ease; }
        .avatars { display: flex; gap: 30px; justify-content: center; margin-top: 15px; }
        .hero-btn { cursor: pointer; text-align: center; }
        .hero-btn img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        button { width: 100%; background: rgba(0,0,0,0.2); color: var(--neon); border: 1px solid var(--neon); padding: 15px; margin-top: 10px; font-weight: bold; border-radius: 12px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; font-size: 13px; }
        input { width: 100%; background: none; border: none; border-bottom: 2px solid var(--neon); color: #fff; text-align: center; margin-bottom: 20px; font-size: 28px; outline: none; padding: 10px 0; }
    </style>
</head>
<body>
    <video id="bg-video" playsinline></video>

    <div class="ui">
        <div id="s0" class="glass">
            <div style="font-weight: bold; letter-spacing: 3px; color: var(--neon); margin-bottom:10px;">NEURO-LAB</div>
            <div class="avatars">
                <div class="hero-btn" onclick="startLab('female')"><img src="f_avatar.jpg"><div style="margin-top:10px; font-size: 11px;">НЕЙРА</div></div>
                <div class="hero-btn" onclick="startLab('male')"><img src="m_avatar.jpg"><div style="margin-top:10px; font-size: 11px;">АЛЕКС</div></div>
            </div>
        </div>

        <div id="s1" class="glass" style="display:none;">
            <div style="margin-bottom: 15px; font-size: 11px; color: var(--neon);">ИДЕНТИФИКАЦИЯ</div>
            <input type="tel" id="birthdate" placeholder="ДД.ММ.ГГГГ" maxlength="10">
            <button onclick="toMenu()">ПРОДОЛЖИТЬ</button>
        </div>

        <div id="s2" class="glass" style="display:none">
            <button onclick="act('Астро-прогноз', 7)">АСТРО-ПРОГНОЗ</button>
            <button onclick="act('Нумерология', 6)">НУМЕРОЛОГИЯ</button>
            <button onclick="act('Биоритмы', 8)">БИО-РИТМЫ</button>
        </div>

        <div id="s3" class="glass" style="display:none">
            <div id="res" style="margin-bottom:20px; font-size: 15px; line-height: 1.6;"></div>
            <button onclick="location.reload()">ОБНУЛИТЬ</button>
        </div>
    </div>

    <script>
        // === ВСТАВЬ СВОЙ API KEY ИЗ GOOGLE ТУТ ===
        const GEMINI_API_KEY = "gen-lang-client-0063870630"; 
        // ========================================

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let hero = 'female';
        const v = document.getElementById('bg-video');

        function playVid(n, isLoop) {
            v.src = hero + '/' + n + '.mp4';
            v.loop = isLoop;
            v.play();
        }

        function startLab(choice) {
            hero = choice;
            v.muted = false;
            document.getElementById('s0').style.display = 'none';
            playVid(1, false); 
            v.onended = function() { if (v.src.includes('1.mp4')) { v.pause(); document.getElementById('s1').style.display = 'block'; } };
        }

        function toMenu() {
            if(!document.getElementById('birthdate').value) return;
            document.getElementById('s1').style.display = 'none';
            document.getElementById('s2').style.display = 'block';
            playVid(2, false);
            v.onended = function() { if (v.src.includes('2.mp4')) { v.pause(); } };
        }

        async function act(type, vidNum) {
            document.getElementById('s2').style.display = 'none';
            const resBox = document.getElementById('res');
            const resScreen = document.getElementById('s3');
            
            // 1. Показываем видео модуля
            playVid(vidNum, false);

            v.onended = async function() {
                // 2. Включаем сканирование (видео 3)
                playVid(3, true);
                resBox.innerText = "Считываю ваш цифровой код...";
                resScreen.style.display = 'block';

                // 3. Запрос к AI
                const bday = document.getElementById('birthdate').value;
                const prompt = `Ты мудрый Оракул ${hero === 'female' ? 'Нейра' : 'Алекс'}. Дай мудрый прогноз на тему ${type} для даты ${bday}. 2 предложения.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com{GEMINI_API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    const aiText = data.candidates[0].content.parts[0].text;

                    // 4. Финальное видео и текст
                    playVid(4, false);
                    resBox.innerText = aiText;
                } catch (e) {
                    resBox.innerText = "Матрица перегружена. Попробуй позже.";
                }
            };
        }
    </script>
</body>
</html>
