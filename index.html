<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURO-LAB</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --neon: #00f2ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        #bg-video { position: fixed; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: -1; }
        .ui { position: absolute; bottom: 40px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .glass { background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border: 1px solid var(--neon); border-radius: 15px; width: 85%; padding: 20px; text-align: center; }
        button { width: 100%; background: none; border: 1px solid var(--neon); color: var(--neon); padding: 14px; margin: 6px 0; text-transform: uppercase; font-size: 12px; border-radius: 5px; }
        .avatars { display: flex; gap: 20px; justify-content: center; margin-top: 15px; }
        .avatars img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
    </style>
</head>
<body>
    <video id="bg-video" autoplay muted playsinline loop></video>
    <div class="ui">
        <div id="s0" class="glass">
            <div>脗脹脕脜脨脠 脧脨脦脗脦脛脥脠脢脌</div>
            <div class="avatars">
                <!-- 脗脥脠脤脌脥脠脜: 脠帽茂冒脿芒毛氓铆没 茂贸貌猫 锚 貌芒卯猫矛 脿芒脿貌脿冒锚脿矛 -->
                <div onclick="setH('female')"><img src="f_avatar.jpg.jpg"><br><small>脥脜脡脨脌</small></div>
                <div onclick="setH('male')"><img src="m_avatar.jpg..jpg"><br><small>脌脣脜脢脩</small></div>
            </div>
        </div>
        <div id="s1" class="glass" style="display:none">
            <input type="text" id="bd" placeholder="脛脌脪脌 (脛脛.脤脤.脙脙脙脙)" style="width:100%; background:none; border:none; border-bottom:1px solid var(--neon); color:#fff; text-align:center; margin-bottom:15px; outline:none;">
            <button onclick="toMenu()">脗脦脡脪脠</button>
        </div>
        <div id="s2" class="glass" style="display:none">
            <button onclick="act(7)">脌脩脪脨脦-脧脨脦脙脥脦脟</button>
            <button onclick="act(6)">脥脫脤脜脨脦脣脦脙脠脽</button>
            <button onclick="act(8)">脕脠脦-脨脠脪脤脹</button>
            <button style="color:#ff00ff; border-color:#ff00ff" onclick="goSync()">脩脦脗脤脜脩脪脠脤脦脩脪脺</button>
        </div>
        <div id="s3" class="glass" style="display:none">
            <div id="res"></div>
            <button onclick="back()">脥脌脟脌脛</button>
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        let hero = 'female';
        const v = document.getElementById('bg-video');

        function setH(h) { 
            hero = h; 
            document.getElementById('s0').style.display='none'; 
            document.getElementById('s1').style.display='block'; 
            play(1, false); 
        }

        function toMenu() { 
            document.getElementById('s1').style.display='none'; 
            document.getElementById('s2').style.display='block'; 
            play(2, true); 
        }

        function act(n) { 
            document.getElementById('s2').style.display='none'; 
            play(n, false); 
            setTimeout(() => { play(3, true); setTimeout(() => { show(); }, 3000); }, 4000); 
        }

        function show() { 
            play(4, false); 
            document.getElementById('s3').style.display='block'; 
            document.getElementById('res').innerText = "脌铆脿毛猫莽 莽脿芒氓冒酶氓铆. 脤脿貌冒猫枚脿 茂卯盲貌芒氓冒忙盲脿氓貌 贸帽茂氓玫."; 
        }

        function play(n, loop) { 
            // 脗脥脠脤脌脥脠脜: 脢卯盲 貌氓茂氓冒眉 猫霉氓貌 貌芒卯猫 么脿茅毛没 帽 盲芒卯茅铆没矛 .mp4.mp4
            v.src = hero + '/' + n + '.mp4.mp4'; 
            v.loop = loop; 
            v.play(); 
        }

        function goSync() { act(3); }
        function back() { 
            document.getElementById('s3').style.display='none'; 
            document.getElementById('s2').style.display='block'; 
            play(2, true); 
        }
    </script>
</body>
</html>
