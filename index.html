<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цифровой Оракул</title>
    <script src="https://telegram.org/js/telegram-web-app.js?61"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: #000; color: #00f2ff; font-family: Arial, sans-serif;
        }
        #bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; opacity: 0.6;
        }
        .ui {
            position: relative; z-index: 100; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .box {
            background: rgba(0,0,0,0.8); border: 2px solid #00f2ff; border-radius: 20px;
            width: 85%; max-width: 400px; padding: 25px; text-align: center;
        }
        .av-row {
            display: flex; gap: 30px; justify-content: center; margin: 25px 0;
        }
        .av-btn {
            cursor: pointer; text-align: center;
        }
        .av-btn img {
            width: 90px; height: 90px; border-radius: 50%;
            border: 3px solid #00f2ff; box-shadow: 0 0 15px #00f2ff;
        }
        button {
            width: 100%; background: #00f2ff; color: #000; border: none;
            padding: 16px; margin: 12px 0; font-weight: bold; font-size: 18px;
            border-radius: 12px; cursor: pointer; transition: all 0.2s;
        }
        button:hover { background: #00d4e6; transform: scale(1.03); }
        input {
            width: 100%; background: none; border: none; border-bottom: 3px solid #00f2ff;
            color: #fff; text-align: center; margin: 20px 0; font-size: 22px; outline: none;
        }
        #resultText { font-size: 18px; line-height: 1.5; min-height: 120px; }
    </style>
</head>
<body>
    <video id="bg-video" autoplay muted playsinline></video>

    <div class="ui">
        <div id="step0" class="box">
            <h2>ВЫБЕРИ ПРОВОДНИКА</h2>
            <div class="av-row">
                <div class="av-btn" onclick="goStep1('female')">
                    <img src="f_avatar.jpg.jpg" onerror="this.src='f_avatar.jpg'" alt="Нейра">
                    <div>НЕЙРА</div>
                </div>
                <div class="av-btn" onclick="goStep1('male')">
                    <img src="m_avatar.jpg..jpg" onerror="this.src='m_avatar.jpg'" alt="Алекс">
                    <div>АЛЕКС</div>
                </div>
            </div>
        </div>

        <div id="step1" class="box" style="display:none">
            <h2>ВВЕДИ ДАТУ РОЖДЕНИЯ</h2>
            <input type="text" id="dateInput" placeholder="ДД.ММ.ГГГГ" maxlength="10">
            <button onclick="goStep2()">ИНИЦИАЛИЗИРОВАТЬ СОЕДИНЕНИЕ</button>
        </div>

        <div id="step2" class="box" style="display:none">
            <h2>ВЫБЕРИ МОДУЛЬ</h2>
            <button onclick="runModule(7)">АСТРО-ПРОГНОЗ</button>
            <button onclick="runModule(6)">НУМЕРОЛОГИЯ</button>
            <button onclick="runModule(8)">БИО-РИТМЫ</button>
        </div>

        <div id="step3" class="box" style="display:none">
            <h2>СИНХРОНИЗАЦИЯ ЗАВЕРШЕНА</h2>
            <div id="resultText">Анализ...</div>
            <button onclick="location.reload()">ЗАНОВО</button>
        </div>
    </div>

    <script>
        var tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();  // Важно: сообщает Telegram, что приложение готово

        var currentHero = 'female';
        var birthDate = '';
        var videoPlayer = document.getElementById('bg-video');

        // Функция смены видео с fallback
        function changeVideo(n, isLoop) {
            var folder = currentHero;
            var path1 = '/' + folder + '/' + n + '.mp4.mp4';
var path2 = '/' + folder + '/' + n + '.mp4';

            videoPlayer.src = path1;
            videoPlayer.loop = isLoop;
            videoPlayer.load();

            videoPlayer.play().catch(function() {
                videoPlayer.src = path2;
                videoPlayer.load();
                videoPlayer.play().catch(function(err) {
                    console.log('Видео не загрузилось:', err);
                });
            });
        }

        function goStep1(hero) {
            currentHero = hero;
            document.getElementById('step0').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
            changeVideo(1, false);
        }

        function goStep2() {
            var input = document.getElementById('dateInput').value.trim();
            if (!/^\d{2}\.\d{2}\.\d{4}$/.test(input)) {
                alert('Введите дату в формате ДД.ММ.ГГГГ');
                return;
            }
            birthDate = input;

            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            changeVideo(2, true);  // цикл
        }

        function runModule(moduleNum) {
            document.getElementById('step2').style.display = 'none';

            // Проигрываем видео модуля → сканирование → результат
            changeVideo(moduleNum, false);

            setTimeout(function() {
                changeVideo(3, false);  // сканирование \~4 сек
                setTimeout(function() {
                    changeVideo(4, false);
                    showResult(moduleNum);
                    document.getElementById('step3').style.display = 'block';
                }, 4500);
            }, 4500);
        }

        function showResult(moduleNum) {
            var messages = {
                6: ["Числа шепчут: твоя энергия сейчас на пике. Действуй смело в ближайшие 7 дней.", 
                    "Твоё жизненное число указывает на скрытый талант. Раскрой его до конца года."],
                7: ["Звёзды выстраиваются в твою пользу. Неделя любви и неожиданных подарков впереди.", 
                    "Меркурий в ретрограде — будь осторожен с контрактами до 28 марта."],
                8: ["Биоритмы на подъёме. Физическая форма позволит достичь новых рекордов.", 
                    "Эмоциональный цикл в гармонии — время для важных разговоров."]
            };

            var base = messages[moduleNum] || ["Система приняла твой код.", "Синхронизация завершена."];
            var randomMsg = base[Math.floor(Math.random() * base.length)];

            // Лёгкое влияние даты (пример)
            var day = parseInt(birthDate.split('.')[0]) || 15;
            if (day % 2 === 0) {
                randomMsg += "<br><br>Чётный день рождения усиливает интуицию — доверяй внутреннему голосу.";
            }

            document.getElementById('resultText').innerHTML = randomMsg;
        }

        // Стартовое видео при загрузке (чтобы не было чёрного экрана)
        changeVideo(1, false);
    </script>
</body>
</html>
