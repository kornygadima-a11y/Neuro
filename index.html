<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURO-LAB OFFLINE TEST</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #00f2ff; font-family: sans-serif; }
        #v { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; background: #111; }
        .ui { position: relative; z-index: 100; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); }
        .glass { background: rgba(0,0,0,0.8); border: 2px solid #00f2ff; border-radius: 20px; width: 85%; padding: 25px; text-align: center; box-shadow: 0 0 20px #00f2ff; }
        .avatars { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
        .hero-btn { background: rgba(0,242,255,0.1); border: 1px solid #333; border-radius: 15px; padding: 15px; cursor: pointer; width: 100px; }
        .hero-btn img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #00f2ff; pointer-events: none; }
        button { width: 100%; background: #00f2ff; color: #000; border: none; padding: 15px; margin-top: 15px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        #status { position: fixed; top: 10px; color: yellow; font-size: 12px; z-index: 1000; }
    </style>
</head>
<body>
    <div id="status">СИСТЕМА ГОТОВА</div>
    <video id="v" playsinline loop muted></video>

    <div class="ui" id="main-ui">
        <div id="s0" class="glass">
            <h2 style="margin: 0;">NEURO-LAB</h2>
            <p>ВЫБЕРИ ПРОВОДНИКА</p>
            <div class="avatars">
                <div class="hero-btn" onclick="st('female')">
                    <img src="f_avatar.jpg">
                    <div>НЕЙРА</div>
                </div>
                <div class="hero-btn" onclick="st('male')">
                    <img src="m_avatar.jpg">
                    <div>АЛЕКС</div>
                </div>
            </div>
        </div>

        <div id="s1" class="glass" style="display:none">
            <p>ИНИЦИАЛИЗАЦИЯ...</p>
            <button onclick="location.reload()">СБРОС</button>
        </div>
    </div>

    <script>
        var video = document.getElementById('v');
        var log = document.getElementById('status');

        function st(hero) {
            log.innerText = "ЗАГРУЗКА: " + hero + "/1.mp4";
            
            // 1. Указываем путь
            video.src = hero + "/1.mp4";
            
            // 2. Снимаем мут (нужен клик пользователя, и он у нас есть!)
            video.muted = false;
            
            // 3. Пробуем запустить
            video.play()
                .then(function() {
                    log.innerText = "ВИДЕО ИГРАЕТ!";
                    document.getElementById('s0').style.display = 'none';
                    document.getElementById('s1').style.display = 'block';
                })
                .catch(function(error) {
                    log.innerText = "ОШИБКА: " + error.message;
                    console.error(error);
                });
        }
    </script>
</body>
</html>
